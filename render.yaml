services:
  - type: web
    name: visionquest
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run prisma:migrate:deploy && node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TEACHER_KEY
        sync: false
      - key: API_KEY_ENCRYPTION_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Risk-tiered agent enablement. "off" | "readonly" | "full".
      # Stage 6a (readonly) entered 2026-07-08 per docs/runbooks/sage-agent-enablement.md:
      # preconditions green same day (red-team --strict: 0 hard violations;
      # chat harness tool 4/4 + guardrail 5/5 at temperature 0).
      # Do NOT advance to "full" without the 6b preconditions + a monitoring window.
      - key: SAGE_AGENT_MODE
        value: "readonly"
      # DEPRECATED: superseded by SAGE_AGENT_MODE. Kept only as a back-compat
      # fallback (unset MODE + this "false" still resolves to off). Remove once
      # SAGE_AGENT_MODE is the sole control.
      - key: SAGE_AGENT_ENABLED
        value: "false"
      - key: SAGE_RAG_ABSTAIN_DISTANCE
        value: "0.40"
      - key: CF_ACCESS_CLIENT_ID
        sync: false
      - key: CF_ACCESS_CLIENT_SECRET
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_REGION
        value: us-east-1
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      # Phase 2: set to "true" to enable S3 presigned download URLs.
      # See docs/plans/presigned-urls-runbook.md.
      - key: USE_PRESIGNED_URLS
        sync: false
# Cron jobs moved to Supabase pg_cron in Phase 1 of the Supabase optimization.
# See prisma/migrations/20260421000000_add_pg_cron_jobs and
# docs/plans/pg-cron-setup-runbook.md. The scripts/run-*.mjs files are kept
# as manual-trigger fallbacks.
