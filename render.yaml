services:
  - type: web
    name: visionquest
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run prisma:migrate:deploy; node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TEACHER_KEY
        sync: false
      - key: API_KEY_ENCRYPTION_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_REGION
        value: us-east-1
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
  - type: cron
    name: visionquest-appointment-reminders
    runtime: node
    schedule: "0 * * * *"
    buildCommand: "true"
    startCommand: node scripts/run-appointment-reminders.mjs
    envVars:
      - key: APP_BASE_URL
        fromService:
          type: web
          name: visionquest
          envVarKey: APP_BASE_URL
      - key: CRON_SECRET
        fromService:
          type: web
          name: visionquest
          envVarKey: CRON_SECRET
  - type: cron
    name: visionquest-job-processor
    runtime: node
    schedule: "*/10 * * * *"
    buildCommand: "true"
    startCommand: node scripts/run-job-processor.mjs
    envVars:
      - key: APP_BASE_URL
        fromService:
          type: web
          name: visionquest
          envVarKey: APP_BASE_URL
      - key: CRON_SECRET
        fromService:
          type: web
          name: visionquest
          envVarKey: CRON_SECRET
  - type: cron
    name: visionquest-daily-coaching
    runtime: node
    schedule: "0 13 * * *"
    buildCommand: "true"
    startCommand: node scripts/run-daily-coaching.mjs
    envVars:
      - key: APP_BASE_URL
        fromService:
          type: web
          name: visionquest
          envVarKey: APP_BASE_URL
      - key: CRON_SECRET
        fromService:
          type: web
          name: visionquest
          envVarKey: CRON_SECRET
