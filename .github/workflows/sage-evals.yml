name: Sage Evals

# Live model evals for Sage. Separate from the main `CI` workflow because they
# (a) call the Gemini API (cost + a GEMINI_API_KEY secret) and (b) are
# non-deterministic, so they don't belong on the hard PR gate for every change.
#
# Triggers: on-demand, nightly, and on PRs that touch Sage's prompt/tools/evals.
# When GEMINI_API_KEY is not configured the live steps no-op (so forks and
# secret-less environments stay green).
on:
  workflow_dispatch:
  schedule:
    - cron: "27 7 * * *" # nightly ~07:27 UTC
  pull_request:
    branches: [main]
    paths:
      - "src/lib/sage/**"
      - "config/sage-*.json"
      - "scripts/sage-*.mjs"

jobs:
  sage-evals:
    runs-on: ubuntu-latest
    env:
      # Importing the tool registry pulls in the Prisma client; a fake URL is
      # fine because no eval connects to a database (the model calls are HTTP).
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
      JWT_SECRET: "ci-test-secret-not-real-at-all-32"
      API_KEY_ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      APP_BASE_URL: "http://localhost:3000"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Red-team eval (gating — hard boundary violations fail the run)
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::notice::GEMINI_API_KEY not set — skipping live red-team eval."
            exit 0
          fi
          npm run sage:redteam:eval

      - name: Quality eval (informational)
        continue-on-error: true
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::notice::GEMINI_API_KEY not set — skipping quality eval."
            exit 0
          fi
          npm run sage:quality:eval

      - name: Tool-selection eval (informational)
        continue-on-error: true
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::notice::GEMINI_API_KEY not set — skipping tool-selection eval."
            exit 0
          fi
          npm run sage:agent:eval

      - name: Chat harness — deterministic families (gating — tool + guardrail failures fail the run)
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::notice::GEMINI_API_KEY not set — skipping live chat harness."
            exit 0
          fi
          npx tsx scripts/sage-chat-harness.mjs --provider=gemini --strict --families=tool,guardrail --temperature=0

  sage-memory-eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: visionquest_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/visionquest_ci"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/visionquest_ci"
      JWT_SECRET: "ci-test-secret-not-real-at-all-32"
      API_KEY_ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      APP_BASE_URL: "http://localhost:3000"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Sage memory eval (informational — non-deterministic, needs live DB + model)
        continue-on-error: true
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::notice::GEMINI_API_KEY not set — skipping sage memory eval."
            exit 0
          fi
          npm run sage:memory:eval

      - name: Chat harness — full run with judge (informational — nightly only, needs live DB + model)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::notice::GEMINI_API_KEY not set — skipping full chat harness."
            exit 0
          fi
          npx tsx scripts/sage-chat-harness.mjs --provider=gemini --judge=gemini --out=.planning/sage-chat-harness/nightly.json

  sage-chat-harness-ollama:
    # On-demand acceptance run against a self-hosted Ollama endpoint. No-ops
    # without OLLAMA_URL configured (this repo has no default local server in
    # CI) — exists so an operator can point OLLAMA_URL/OLLAMA_MODEL at a
    # reachable server (e.g. via a self-hosted runner or tunnel) and confirm
    # the provider-agnostic harness holds up before cutover.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
      JWT_SECRET: "ci-test-secret-not-real-at-all-32"
      API_KEY_ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      APP_BASE_URL: "http://localhost:3000"
      OLLAMA_URL: ${{ secrets.OLLAMA_URL }}
      OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Chat harness — Ollama acceptance (no-op without OLLAMA_URL)
        continue-on-error: true
        run: |
          if [ -z "$OLLAMA_URL" ]; then
            echo "::notice::OLLAMA_URL not set — skipping Ollama acceptance run."
            exit 0
          fi
          npx tsx scripts/sage-chat-harness.mjs --provider=ollama --families=tool,guardrail,readability
