name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      # Hermetic Postgres for the RLS integration suite (src/lib/rls.test.ts).
      # The main `npm test` step keeps using the fake DATABASE_URL below; only
      # the RLS migrate/test steps point DATABASE_URL at this container.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: visionquest_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      # schema.prisma requires directUrl; any Prisma CLI step that loads config
      # needs it present. Fake by default (no step connects via it except the
      # RLS migrate/test steps, which override both with the real container URL).
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
      JWT_SECRET: "ci-test-secret-not-real-at-all-32"
      API_KEY_ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      APP_BASE_URL: "http://localhost:3000"
      # RLS footgun enforcement — any Prisma query that runs without an RLS
      # context will throw, surfacing the bug fixed in 0cb9876/355d735.
      # See src/lib/db.ts#warnMissingRlsContext for the three-mode ladder.
      RLS_CONTEXT_INJECTION: "true"
      RLS_CONTEXT_STRICT: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Audit API auth wrappers
        # Static scan of every route file; exits 1 on any FOOTGUN finding
        # (withErrorHandler + getSession() + prisma — the 2026-04-24 bug).
        run: npm run audit:api-auth

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      # --- RLS cross-tenant integration tests (the only guard against a
      # policy regression re-exposing other students' data — P0 for the
      # TANF/SNAP population). Run against the hermetic Postgres service
      # above with a real, migrated schema. See
      # docs/runbooks/enable-rls-tests-in-ci.md.
      - name: Apply migrations to RLS test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/visionquest_ci"
          # schema.prisma declares directUrl = env("DIRECT_URL"); migrate deploy
          # validates it. The hermetic CI Postgres has no pooler, so direct ==
          # pooled. Without this the RLS CI step fails P1012 before any test runs.
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/visionquest_ci"

      - name: Run RLS integration tests
        run: npm run test:rls
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/visionquest_ci"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/visionquest_ci"
          RLS_TEST_ENABLED: "true"

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install chromium

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          SMOKE_SERVER_SCRIPT: start
