name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      JWT_SECRET: "ci-test-secret-not-real-at-all-32"
      API_KEY_ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      APP_BASE_URL: "http://localhost:3000"
      # RLS footgun enforcement — any Prisma query that runs without an RLS
      # context will throw, surfacing the bug fixed in 0cb9876/355d735.
      # See src/lib/db.ts#warnMissingRlsContext for the three-mode ladder.
      RLS_CONTEXT_INJECTION: "true"
      RLS_CONTEXT_STRICT: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Lint server-only guard (db imports must include `import "server-only"`)
        # `npm run lint` already chains this in warn mode; this step makes the
        # output discoverable as its own CI line. Flip the script (or this
        # step) to lint:server-only:strict once Bundle #1 / PR #41 lands the
        # guard on every src/lib/** module.
        run: npm run lint:server-only

      - name: Audit API auth wrappers
        # Static scan of every route file; exits 1 on any FOOTGUN finding
        # (withErrorHandler + getSession() + prisma — the 2026-04-24 bug).
        run: npm run audit:api-auth

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install chromium

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          SMOKE_SERVER_SCRIPT: start
